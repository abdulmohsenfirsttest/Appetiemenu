/* ─────────────────────────────────────────────
   ALLERGEN CONFIG — icons + labels
   ───────────────────────────────────────────── */
const allergenMeta = {
  dairy:     { icon: "🧀", label: "Dairy" },
  gluten:    { icon: "🌾", label: "Gluten" },
  nuts:      { icon: "🥜", label: "Tree Nuts" },
  peanuts:   { icon: "🥜", label: "Peanuts" },
  fish:      { icon: "🐟", label: "Fish" },
  shellfish: { icon: "🦐", label: "Shellfish" },
  sesame:    { icon: "⚪", label: "Sesame" },
  soy:       { icon: "🫘", label: "Soy" },
  eggs:      { icon: "🥚", label: "Eggs" },
};


/* ─────────────────────────────────────────────
   STATE
   ───────────────────────────────────────────── */
let activeCategory = "All";
let searchQuery = "";
let showCalories = true;


/* ─────────────────────────────────────────────
   HELPERS
   ───────────────────────────────────────────── */
const $ = (s) => document.querySelector(s);
const categories = ["All", ...new Set(menuItems.map((i) => i.category))];

function filteredItems() {
  return menuItems.filter((item) => {
    const catMatch = activeCategory === "All" || item.category === activeCategory;
    const q = searchQuery.toLowerCase();
    const textMatch =
      !q ||
      item.nameEn.toLowerCase().includes(q) ||
      item.nameAr.includes(q) ||
      item.descEn.toLowerCase().includes(q) ||
      item.category.toLowerCase().includes(q);
    return catMatch && textMatch;
  });
}


/* ─────────────────────────────────────────────
   RENDER — Category tabs
   ───────────────────────────────────────────── */
function renderTabs() {
  const bar = $("#cat-bar");
  bar.innerHTML = categories
    .map((c) => {
      const active = c === activeCategory;
      return `<button data-cat="${c}" class="shrink-0 px-4 py-1.5 rounded-full text-sm font-medium transition whitespace-nowrap
        ${active ? "bg-brand text-white shadow-md shadow-brand/25" : "bg-brandLt text-brand hover:bg-brand/10"}">${c}</button>`;
    })
    .join("");

  bar.querySelectorAll("button").forEach((btn) =>
    btn.addEventListener("click", () => {
      activeCategory = btn.dataset.cat;
      renderTabs();
      renderGrid();
    })
  );
}


/* ─────────────────────────────────────────────
   RENDER — Menu grid cards
   ───────────────────────────────────────────── */
function renderGrid() {
  const items = filteredItems();
  const grid = $("#menu-grid");
  const empty = $("#empty-state");
  const counter = $("#item-count");

  counter.textContent = `${items.length} item${items.length !== 1 ? "s" : ""}`;

  if (!items.length) {
    grid.innerHTML = "";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  grid.innerHTML = items
    .map(
      (item, idx) => `
    <article class="card-lift fade-up bg-white rounded-2xl overflow-hidden cursor-pointer border border-gray-100"
             style="animation-delay:${Math.min(idx * 40, 400)}ms"
             onclick="openModal(${item.id})">
      <!-- Image -->
      <div class="relative aspect-[4/3] bg-brandLt img-placeholder overflow-hidden">
        <img src="${item.image}" alt="${item.nameEn}"
             class="w-full h-full object-cover transition-opacity duration-300 opacity-0"
             loading="lazy"
             onload="this.classList.remove('opacity-0')"
             onerror="this.style.display='none'" />
        ${showCalories ? `<span class="absolute top-2 right-2 bg-white/90 backdrop-blur text-xs font-bold text-brand px-2 py-0.5 rounded-full shadow">${item.calories} cal</span>` : ""}
      </div>
      <!-- Info -->
      <div class="p-3">
        <h3 class="text-sm font-bold leading-tight truncate">${item.nameEn}</h3>
        <p class="text-xs text-muted mt-0.5 truncate" dir="rtl">${item.nameAr}</p>
        <p class="text-[11px] text-muted mt-1 line-clamp-2 leading-relaxed">${item.descEn}</p>
        <div class="flex items-center justify-between mt-2">
          <span class="text-brand font-bold text-sm">${item.price} SAR</span>
          <span class="text-[10px] text-muted">${item.size}</span>
        </div>
      </div>
    </article>`
    )
    .join("");
}


/* ─────────────────────────────────────────────
   MODAL — detail view
   ───────────────────────────────────────────── */
function openModal(id) {
  const item = menuItems.find((i) => i.id === id);
  if (!item) return;

  const n = item.nutrition;
  const totalMacro = (n.fat || 0) + (n.carbs || 0) + (n.protein || 0) || 1;

  const allergenHTML = item.allergens.length
    ? item.allergens
        .map((a) => {
          const m = allergenMeta[a] || { icon: "⚠️", label: a };
          return `<span class="inline-flex items-center gap-1 bg-red-50 text-red-700 text-xs font-medium px-2.5 py-1 rounded-full">${m.icon} ${m.label}</span>`;
        })
        .join("")
    : `<span class="text-xs text-green-600 font-medium">✓ No common allergens</span>`;

  $("#modal-body").innerHTML = `
    <!-- Image -->
    <div class="aspect-[4/3] bg-brandLt img-placeholder overflow-hidden sm:rounded-t-2xl">
      <img src="${item.image}" alt="${item.nameEn}"
           class="w-full h-full object-cover"
           onerror="this.style.display='none'" />
    </div>

    <div class="p-5 space-y-5">
      <!-- Title + price -->
      <div class="flex items-start justify-between gap-3">
        <div>
          <h2 class="text-xl font-bold">${item.nameEn}</h2>
          <p class="text-sm text-muted mt-0.5" dir="rtl">${item.nameAr}</p>
        </div>
        <span class="shrink-0 bg-brand text-white text-sm font-bold px-3 py-1 rounded-full">${item.price} SAR</span>
      </div>

      <!-- Description -->
      <p class="text-sm text-muted leading-relaxed">${item.descEn}</p>
      <p class="text-sm text-muted leading-relaxed" dir="rtl">${item.descAr}</p>

      <!-- Nutrition facts -->
      <div class="bg-sand rounded-xl p-4 space-y-3">
        <h3 class="text-xs font-bold uppercase tracking-wider text-muted">Nutrition Facts</h3>
        <div class="flex items-center justify-between">
          <span class="text-2xl font-bold text-brand">${item.calories}</span>
          <span class="text-xs text-muted">kcal per serving (${item.size})</span>
        </div>

        <!-- Macro bars -->
        <div class="space-y-2">
          ${macroBar("Fat", n.fat, totalMacro, "#F59E0B")}
          ${macroBar("Carbs", n.carbs, totalMacro, "#7C5CFC")}
          ${macroBar("Protein", n.protein, totalMacro, "#10B981")}
          ${n.sugars ? macroBar("Sugars", n.sugars, totalMacro, "#F472B6") : ""}
        </div>
      </div>

      <!-- Allergens -->
      <div class="space-y-2">
        <h3 class="text-xs font-bold uppercase tracking-wider text-muted">Allergen Information</h3>
        <div class="flex flex-wrap gap-2">${allergenHTML}</div>
      </div>
    </div>
  `;

  const backdrop = $("#modal-backdrop");
  backdrop.classList.remove("hidden");
  document.body.style.overflow = "hidden";

  // Animate macro bars after paint
  requestAnimationFrame(() => {
    backdrop.querySelectorAll(".macro-bar-fill").forEach((bar) => {
      bar.style.width = bar.dataset.width;
    });
  });
}

function macroBar(label, grams, total, color) {
  const pct = Math.round((grams / total) * 100);
  return `
    <div class="flex items-center gap-2 text-xs">
      <span class="w-14 text-muted font-medium">${label}</span>
      <div class="flex-1 h-2 rounded-full bg-gray-200 overflow-hidden">
        <div class="macro-bar-fill h-full rounded-full" style="width:0;background:${color}" data-width="${pct}%"></div>
      </div>
      <span class="w-10 text-right font-bold">${grams}g</span>
    </div>`;
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget && !e.currentTarget.id) return;
  $("#modal-backdrop").classList.add("hidden");
  document.body.style.overflow = "";
}

// ESC key
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});


/* ─────────────────────────────────────────────
   EVENT LISTENERS
   ───────────────────────────────────────────── */
// Search
$("#search-input").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  renderGrid();
});

// Calorie toggle
$("#cal-toggle").addEventListener("click", () => {
  showCalories = !showCalories;
  $("#cal-toggle").classList.toggle("bg-brand", showCalories);
  $("#cal-toggle").classList.toggle("text-white", showCalories);
  $("#cal-toggle").classList.toggle("bg-brandLt", !showCalories);
  $("#cal-toggle").classList.toggle("text-brand", !showCalories);
  renderGrid();
});


/* ─────────────────────────────────────────────
   INIT
   ───────────────────────────────────────────── */
renderTabs();
renderGrid();
</script>
